name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    - name: Run tests
      working-directory: ./server
      run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    - name: Install dependencies
      working-directory: ./client
      run: npm ci
    - name: Run tests
      working-directory: ./client
      run: npm test
    - name: Build frontend
      working-directory: ./client
      run: npm run build
